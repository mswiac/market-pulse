<mat-toolbar color="primary">
  <span>MarketPulse</span>
  <span class="spacer"></span>
  @if (user(); as currentUser) {
    <span class="user-email">{{ currentUser.email }}</span>
  }
  <button mat-button (click)="onLogout()">Wyloguj</button>
</mat-toolbar>

<div class="home-content">
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-card-title>Witaj ponownie</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (user(); as currentUser) {
        <p>Zalogowano jako: <strong>{{ currentUser.email }}</strong>.</p>
      }
    </mat-card-content>
  </mat-card>

  <section class="alerts-section">
    <h2>Twoje alerty</h2>
    <app-alert-list />
  </section>
</div>

<button matFab extended color="primary" class="new-alert-fab" (click)="openNewAlertDialog()">
  <mat-icon>add</mat-icon>
  Nowy alert
</button>
