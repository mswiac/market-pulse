<mat-toolbar color="primary">
  <span>MarketPulse</span>
  <span class="spacer"></span>
  @if (user(); as currentUser) {
    <span class="user-email">{{ currentUser.email }}</span>
  }
  <button mat-button (click)="onLogout()" i18n="@@home.logout">Log out</button>
</mat-toolbar>

<div class="home-content">
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-card-title i18n="@@home.welcomeTitle">Welcome back</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (user(); as currentUser) {
        <p><span i18n="@@home.loggedInAs">Logged in as:</span> <strong>{{ currentUser.email }}</strong>.</p>
      }
    </mat-card-content>
  </mat-card>

  <section class="alerts-section">
    <h2 i18n="@@home.alertsSectionTitle">Your alerts</h2>
    <app-alert-list />
  </section>
</div>

<button matFab extended color="primary" class="new-alert-fab" (click)="openNewAlertDialog()">
  <mat-icon>add</mat-icon>
  <span i18n="@@home.newAlertFab">New alert</span>
</button>
